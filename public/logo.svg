<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" x="0px" y="0px"
   viewBox="0 0 512 512" xml:space="preserve">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0f172a"/>
    <stop offset="100%" style="stop-color:#1e293b"/>
  </linearGradient>
  <linearGradient id="fGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#10b981"/>
    <stop offset="100%" style="stop-color:#059669"/>
  </linearGradient>
</defs>
<!-- Background rounded square -->
<rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>
<!-- Stylized F letter -->
<g transform="translate(256, 256)">
  <!-- Main vertical bar of F -->
  <rect x="-100" y="-150" width="52" height="300" rx="10" fill="url(#fGrad)"/>
  <!-- Top horizontal bar of F -->
  <rect x="-100" y="-150" width="200" height="48" rx="10" fill="url(#fGrad)"/>
  <!-- Middle horizontal bar of F -->
  <rect x="-100" y="-30" width="150" height="40" rx="8" fill="url(#fGrad)"/>
  <!-- Ledger dots (accounting element) -->
  <circle cx="70" cy="60" r="8" fill="#10b981" opacity="0.6"/>
  <circle cx="70" cy="90" r="8" fill="#10b981" opacity="0.4"/>
  <circle cx="70" cy="120" r="8" fill="#10b981" opacity="0.25"/>
  <!-- Balance line -->
  <line x1="-48" y1="80" x2="50" y2="80" stroke="#10b981" stroke-width="3" opacity="0.3"/>
  <line x1="-48" y1="105" x2="30" y2="105" stroke="#10b981" stroke-width="3" opacity="0.2"/>
</g>
<!-- FAZAI text at bottom -->
<text x="256" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#10b981" letter-spacing="8">FAZAI</text>
</svg>